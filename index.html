<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="To-Buy" />
<meta name="theme-color" content="#12100b" />
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<link rel="manifest" href="manifest.webmanifest" />
<title>To-Buy</title>
<style>
  :root{
    --bg:#12100b; --panel:#1b1810; --panel2:#241f15; --line:#332c1d;
    --txt:#f1ece1; --muted:#a99c82; --accent:#f5a623; --good:#3ecf8e;
    --radius:18px; --shadow:0 12px 36px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1000px 480px at 80% -14%,#2a2410,transparent),var(--bg);
    color:var(--txt); min-height:100vh; padding:24px; line-height:1.45;
  }
  .wrap{max-width:560px;margin:0 auto}
  header{margin-bottom:18px;display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap}
  h1{font-size:22px;margin:0;letter-spacing:.2px}
  .count{color:var(--muted);font-size:13px}
  .count b{color:var(--accent)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
  .addrow{display:flex;gap:10px}
  input{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:13px 14px;font-family:inherit;font-size:16px}
  input:focus{outline:none;border-color:var(--accent)}
  input::placeholder{color:#6d6450}
  button{font-family:inherit;cursor:pointer;transition:transform .05s ease,filter .15s ease}
  button:active{transform:translateY(1px)}
  .add{background:var(--accent);color:#231701;border:none;border-radius:12px;padding:0 18px;font-size:16px;font-weight:700}
  .add:hover{filter:brightness(1.07)}
  ul{list-style:none;margin:0;padding:0}
  li{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--line)}
  li:last-child{border-bottom:none}
  .check{width:24px;height:24px;flex:0 0 auto;border-radius:50%;border:2px solid var(--line);background:transparent;color:transparent;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .check:hover{border-color:var(--accent)}
  .check.done{background:var(--good);border-color:var(--good);color:#06241a}
  .txt{flex:1;min-width:0;font-size:16px;word-break:break-word}
  .txt.done{color:var(--muted);text-decoration:line-through}
  .iconbtn{background:transparent;border:none;color:var(--muted);font-size:16px;padding:4px 7px;flex:0 0 auto}
  .iconbtn:hover{color:var(--txt)}
  .iconbtn.del:hover{color:#ff6b6b}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:24px 0}
  details{margin-top:4px}
  summary{cursor:pointer;color:var(--muted);font-size:13px;list-style:none;padding:8px 2px;display:flex;align-items:center;justify-content:space-between}
  summary::-webkit-details-marker{display:none}
  summary:hover{color:var(--txt)}
  .clearbtn{background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:9px;padding:5px 10px;font-size:12px;font-weight:600}
  .clearbtn:hover{color:#ff6b6b;border-color:rgba(255,107,107,.3)}
  .backup{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:4px}
  .backup button{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:11px;padding:9px 14px;font-size:13px;font-weight:500}
  .backup button:hover{border-color:var(--accent)}
  .footer{color:var(--muted);font-size:12px;text-align:center;margin-top:16px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🛒 To-Buy</h1>
    <div class="count" id="count"></div>
  </header>

  <div class="card">
    <div class="addrow">
      <input id="newItem" placeholder="Add something to buy…" autocomplete="off" />
      <button class="add" id="addBtn">Add</button>
    </div>
  </div>

  <div class="card">
    <ul id="activeList"></ul>
    <details id="boughtWrap" style="display:none">
      <summary>
        <span id="boughtSummary">Bought</span>
        <button class="clearbtn" id="clearBought">Clear bought</button>
      </summary>
      <ul id="boughtList"></ul>
    </details>
  </div>

  <div class="backup">
    <button id="exportBtn">⬇ Export backup</button>
    <button id="importBtn">⬆ Import / sync</button>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none" />
  </div>
  <div class="footer">
    Private &amp; offline — your list is saved only in this browser on this device.<br/>
    Sync PC ↔ iPhone: Export here → send via LocalSend → Import (Merge) there.
  </div>
</div>

<script>
(function(){
  "use strict";
  const LS_KEY="tobuy_v1";
  const SEED=[
    {id:"seed-rug", text:"Large light-tone area rug (covers most of the floor)", bought:false, ts:1},
    {id:"seed-ram", text:"RAM", bought:false, ts:2},
    {id:"seed-bathclean", text:"Bathroom cleaning products", bought:false, ts:3}
  ];
  const DEFAULT={ items: structuredClone(SEED) };

  let state=load();

  function load(){
    try{
      const raw=localStorage.getItem(LS_KEY);
      if(raw===null) return structuredClone(DEFAULT); // first run → seed
      const p=JSON.parse(raw);
      return { items: Array.isArray(p.items)? p.items : [] };
    }catch(e){ return { items: [] }; }
  }
  function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){ /* storage blocked (iOS Private Browsing / sandbox) — keep working in-memory */ } }
  function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
  function uid(){ return "i"+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }

  function render(){
    const active=state.items.filter(i=>!i.bought);
    const bought=state.items.filter(i=>i.bought);

    document.getElementById("count").innerHTML = active.length
      ? '<b>'+active.length+'</b> to buy'
      : (state.items.length? "all bought 🎉" : "");

    const al=document.getElementById("activeList");
    al.innerHTML="";
    if(active.length===0){
      al.innerHTML='<div class="empty">'+(state.items.length? "Nothing left to buy — nice." : "Your list is empty. Add something above.")+'</div>';
    } else {
      active.forEach(it=>al.appendChild(row(it,false)));
    }

    const wrap=document.getElementById("boughtWrap");
    const bl=document.getElementById("boughtList");
    if(bought.length){
      wrap.style.display="";
      document.getElementById("boughtSummary").textContent="Bought ("+bought.length+")";
      bl.innerHTML=""; bought.forEach(it=>bl.appendChild(row(it,true)));
    } else { wrap.style.display="none"; }
  }

  function row(it, done){
    const li=document.createElement("li");
    const chk=document.createElement("button");
    chk.className="check"+(done?" done":""); chk.textContent=done?"✓":""; chk.title=done?"Mark as not bought":"Mark as bought";
    chk.onclick=()=>toggle(it.id);
    const txt=document.createElement("span"); txt.className="txt"+(done?" done":""); txt.textContent=it.text;
    const del=document.createElement("button"); del.className="iconbtn del"; del.textContent="✕"; del.title="Delete";
    del.onclick=()=>remove(it.id);
    li.appendChild(chk); li.appendChild(txt); li.appendChild(del);
    return li;
  }

  function add(){
    const el=document.getElementById("newItem");
    const text=el.value.trim();
    if(!text) return;
    state.items.unshift({id:uid(), text, bought:false, ts:Date.now()});
    save(); el.value=""; el.focus(); render();
  }
  function toggle(id){ const it=state.items.find(i=>i.id===id); if(it){ it.bought=!it.bought; it.ts=Date.now(); save(); render(); } }
  function remove(id){ state.items=state.items.filter(i=>i.id!==id); save(); render(); }
  function clearBought(){ state.items=state.items.filter(i=>!i.bought); save(); render(); }

  // ---------- backup / sync ----------
  function download(fn,txt){ const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([txt],{type:"application/json"})); a.download=fn; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},0); }
  function exportData(){ download("to-buy-backup.json", JSON.stringify(state,null,2)); }
  function mergeState(inc){
    const out={ items: structuredClone(state.items) };
    const byText={}; out.items.forEach(i=>byText[i.text.toLowerCase()]=i);
    if(inc && Array.isArray(inc.items)){
      inc.items.forEach(i=>{
        const k=(i.text||"").toLowerCase(); if(!k) return;
        if(byText[k]){ const e=byText[k]; e.bought = e.bought || i.bought; } // bought if either device bought it
        else { const c={id:i.id||uid(), text:i.text, bought:!!i.bought, ts:i.ts||Date.now()}; out.items.push(c); byText[k]=c; }
      });
    }
    return out;
  }
  function importData(file){
    const r=new FileReader();
    r.onload=()=>{ try{
      const data=JSON.parse(r.result);
      const merge=confirm("Import list:\n\nOK = MERGE with this device's list\nCancel = REPLACE everything here");
      const clean=(arr)=>(Array.isArray(arr)?arr:[]).filter(i=>i&&typeof i.text==="string"&&i.text.trim()).map(i=>({id:i.id||uid(), text:String(i.text), bought:!!i.bought, ts:i.ts||Date.now()}));
      state = merge ? mergeState(data) : { items: clean(data.items) };
      save(); render(); alert("Imported "+(merge?"and merged.":"(replaced)."));
    }catch(e){ alert("Couldn't read that file — is it a To-Buy backup?"); } };
    r.readAsText(file);
  }

  // ---------- wiring ----------
  document.getElementById("addBtn").onclick=add;
  document.getElementById("newItem").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); add(); } });
  document.getElementById("clearBought").onclick=(e)=>{ e.preventDefault(); clearBought(); };
  document.getElementById("exportBtn").onclick=exportData;
  document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
  document.getElementById("importFile").addEventListener("change",e=>{ if(e.target.files[0]) importData(e.target.files[0]); e.target.value=""; });

  render();
})();
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script>
<script>
/* Auto-update: iOS home-screen apps resume a cached snapshot and never re-navigate, so a network-first
   SW can't refresh them. On resume/focus, refetch this page; if its build token changed, reload once.
   BUILD is the literal placeholder in the source (feature inert) and is stamped to a unique id at publish. */
(function(){
  var BUILD="20260606192045";
  if(BUILD.indexOf("APP_BUILD")>-1) return;            // unstamped (local/dev) -> disabled
  var busy=false;
  function check(){
    if(busy||document.visibilityState!=="visible"||!navigator.onLine) return;
    busy=true;
    fetch("./?_au="+Date.now(),{cache:"no-store"})
      .then(function(r){ return r.ok? r.text():null; })
      .then(function(t){
        if(t){ var m=t.match(/var BUILD="([^"]+)"/);
          if(m && m[1]!==BUILD && m[1].indexOf("APP_BUILD")<0){ location.reload(); return; } }
        busy=false;
      })
      .catch(function(){ busy=false; });
  }
  document.addEventListener("visibilitychange",check);
  window.addEventListener("pageshow",check);
  window.addEventListener("focus",check);
})();
</script>
</body>
</html>
